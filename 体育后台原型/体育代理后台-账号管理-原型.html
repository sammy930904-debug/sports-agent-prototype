// 通用:点外部即关闭
function useClickOutside(ref, onClose, active){
  useEffect(()=>{
    if(!active) return;
    const handler = (e)=>{
      if(ref.current && !ref.current.contains(e.target)) onClose();
    };
    // 用 mousedown 比 click 更及时,避免新按下的按钮自己的 onClick 先触发一轮 open/close
    document.addEventListener("mousedown", handler);
    return ()=>document.removeEventListener("mousedown", handler);
  },[active, onClose]);
}

const I18NCtx = React.createContext({lang:"zh-CN", t:I18N["zh-CN"]});
const useT = ()=>React.useContext(I18NCtx);

/* =========================
   按语言格式化金额
   - zh-CN: 全量以"万"为单位(无下限阈值),最多保留 4 位小数;
            例如 8,000 → 0.8 万、300 → 0.03 万、0 → 0 万、-1,200 → -0.12 万
   - en / ko: 国际千分位原值(最多 2 位小数),不使用"万"单位
========================= */
const fmtAmount = (lang, n) => {
  if(n===undefined||n===null||isNaN(n)) return "-";
  if(lang==="zh-CN"){
    const v = n / 10000;
    const s = v.toLocaleString("zh-CN", { maximumFractionDigits: 4 });
    return s + " 万";
  }
  const locale = lang==="ko" ? "ko-KR" : "en-US";
  return n.toLocaleString(locale, { maximumFractionDigits: 2 });
};
// 兼容旧调用:默认按 zh-CN(组件内会用 useT 获取 lang 再包一层)
const fmt = n => fmtAmount("zh-CN", n);

function Badge({children}) {
  return <span className="badge-title">{children}</span>;
}
function FieldLabel({children, req}) {
  return <label className={"block text-sm mb-1 "+(req?"req":"")}>{children}</label>;
}
function Modal({title, width=720, onClose, footer, children, warn=false}){
  return (
    <div className="modal-backdrop">
      <div className="bg-card bd border rounded-lg shadow-2xl flex flex-col" style={{width, maxHeight:"90vh"}}>
        <div className="flex items-center justify-between px-6 py-4 border-b bd">
          <div className="flex-1 text-center">
            <Badge>{warn?<span className="text-red-400">⚠ {title}</span>:title}</Badge>
          </div>
          <button onClick={onClose} className="muted hover:text-white text-xl leading-none">×</button>
        </div>
        <div className="flex-1 overflow-auto scroll px-6 py-5">{children}</div>
        {footer && <div className="px-6 py-4 border-t bd flex justify-end gap-3">{footer}</div>}
      </div>
    </div>
  );
}
function Toast({msg, onDone}){
  useEffect(()=>{ const t = setTimeout(onDone, 2000); return ()=>clearTimeout(t); },[msg]);
  return <div className="toast">{msg}</div>;
}

/* =========================
   币种汇总表
========================= */
function CurrencySummary({accounts}){
  const {t, lang} = useT();
  // 按 schemeId 聚合
  // 规则:总线余额 = 顶代方案可用余额 + Σ 直属下线 totalBalance
  //      (每个下线的 totalBalance 已递归包含自身可用余额与其所有子孙总线余额,
  //       因此只加"直属下线"即可,不可平铺累加全树以免重复计算)
  //      输赢 / 有效投注是玩家叶子节点的实际流水,全树汇总即可
  const rows = TOP_SCHEMES.map(s=>{
    const list = accounts.filter(a=>a.schemeId===s.id);
    const directSubs = list.filter(a=>a.parentId==="qweqwe");
    const winLoss = list.reduce((n,a)=>n+(a.winLoss||0),0);
    const validBet = list.reduce((n,a)=>n+(a.validBet||0),0);
    const totalBalance = s.balance + directSubs.reduce((n,a)=>n+(a.totalBalance||0),0);
    return { ...s, winLoss, validBet, totalBalance };
  });
  return (
    <div className="bg-card bd border rounded-lg mt-5 overflow-hidden">
      <div className="px-5 py-3 text-sm muted border-b bd">{t.summary_title}</div>
      <table className="w-full text-sm">
        <thead className="table-head">
          <tr className="text-center">
            <th className="py-3 px-3 font-normal">{t.col_currency}</th>
            <th className="py-3 px-3 font-normal">{t.col_rate_top}</th>
            <th className="py-3 px-3 font-normal">{t.col_win_loss}</th>
            <th className="py-3 px-3 font-normal">{t.col_valid_bet}</th>
            <th className="py-3 px-3 font-normal">{t.col_balance_top}</th>
            <th className="py-3 px-3 font-normal">{t.col_total_balance}</th>
          </tr>
        </thead>
        <tbody>
          {rows.map(r=>(
            <tr key={r.id} className="text-center row-hover" style={{borderTop:"1px solid #2A2A2C"}}>
              <td className="py-3 px-3 font-semibold gold">{r.currency}</td>
              <td className="py-3 px-3">{r.rate}%</td>
              <td className={"py-3 px-3 "+(r.winLoss<0?"danger":r.winLoss>0?"good":"")}>{fmtAmount(lang, r.winLoss)}</td>
              <td className="py-3 px-3">{fmtAmount(lang, r.validBet)}</td>
              <td className="py-3 px-3">{fmtAmount(lang, r.balance)}</td>
              <td className="py-3 px-3">{fmtAmount(lang, r.totalBalance)}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

/* =========================
   下线列表(树)
========================= */
function DownlineTable({accounts, expanded, toggle, openModal, searchHits}){
  const {t, lang} = useT();
  // 当前哪一行的 更多 ▾ 下拉是打开状态;null = 全部收起
  const [moreOpenId, setMoreOpenId] = useState(null);
  const moreRef = useRef(null);
  useClickOutside(moreRef, useCallback(()=>setMoreOpenId(null),[]), moreOpenId !== null);
  // 构建 parentId -> children
  const map = useMemo(()=>{
    const m = {};
    accounts.forEach(a=>{ (m[a.parentId] = m[a.parentId]||[]).push(a); });
    return m;
  },[accounts]);

  // 搜索模式:只渲染命中集合;命中 + 顶代
  const searchMode = searchHits !== null;

  const rowsToRender = [];
  const walk = (parentId, depth) => {
    const kids = map[parentId] || [];
    kids.forEach(a=>{
      rowsToRender.push({a, depth});
      if(expanded.has(a.id) && a.type==="agent") walk(a.id, depth+1);
    });
  };
  if(!searchMode){
    walk("qweqwe", 0);
  } else {
    // 搜索:扁平渲染命中的账号;点击展开也同样可以
    searchHits.forEach(a=>{
      rowsToRender.push({a, depth:0, flat:true});
      if(expanded.has(a.id) && a.type==="agent") walk(a.id, 1);
    });
  }

  const schemeOf = id => TOP_SCHEMES.find(s=>s.id===id);

  return (
    <div className="bg-card bd border rounded-lg mt-5" style={{overflow:"visible"}}>
      <table className="w-full text-sm">
        <thead className="table-head">
          <tr>
            <th className="py-3 px-3 font-normal text-left" style={{width:"18%"}}>{t.col_sys_id}</th>
            <th className="py-3 px-3 font-normal text-left" style={{width:"15%"}}>{t.col_username}</th>
            <th className="py-3 px-3 font-normal">{t.col_currency}</th>
            <th className="py-3 px-3 font-normal">{t.col_balance}</th>
            <th className="py-3 px-3 font-normal">{t.col_total_balance}</th>
            <th className="py-3 px-3 font-normal">{t.col_child}</th>
            <th className="py-3 px-3 font-normal">{t.col_status}</th>
            <th className="py-3 px-3 font-normal">{t.col_type}</th>
            <th className="py-3 px-3 font-normal text-right">{t.col_action}</th>
          </tr>
        </thead>
        <tbody>
          {rowsToRender.length===0 && (
            <tr><td colSpan="9" className="text-center muted py-10">{t.empty}</td></tr>
          )}
          {rowsToRender.map(({a,depth,flat},i)=>{
            const sc = schemeOf(a.schemeId);
            const isAgent = a.type==="agent";
            const isExpanded = expanded.has(a.id);
            return (
              <tr key={a.id+i} className="row-hover" style={{borderTop:"1px solid #2A2A2C"}}>
                <td className="py-3 px-3">
                  <div className="flex items-center" style={{paddingLeft: depth*24}}>
                    {isAgent ? (
                      <button onClick={()=>toggle(a.id)} className="mr-2 gold w-4">
                        {isExpanded ? "▼" : "▶"}
                      </button>
                    ) : <span className="mr-2 inline-block w-4"></span>}
                    <div>
                      <div className="gold font-mono">{a.id}{flat?<span className="ml-2 gold">★</span>:null}</div>
                    </div>
                  </div>
                </td>
                <td className="py-3 px-3">
                  <div className="font-mono">{a.user}</div>
                </td>
                <td className="py-3 px-3 text-center">{sc?.currency}</td>
                <td className="py-3 px-3 text-center">{fmtAmount(lang, a.balance)}</td>
                <td className="py-3 px-3 text-center">{fmtAmount(lang, a.totalBalance)}</td>
                <td className="py-3 px-3 text-center">{isAgent?a.childCount:"-"}</td>
                <td className="py-3 px-3 text-center">
                  <span className={"chip "+(a.status==="on"?"chip-on":"chip-off")}>{a.status==="on"?t.st_on:t.st_off}</span>
                </td>
                <td className="py-3 px-3 text-center">{isAgent?t.type_agent:t.type_player}</td>
                <td className="py-3 px-3 text-right whitespace-nowrap">
                  {isAgent && <button className="btn-ghost" onClick={()=>openModal({type:"add", parent:a})}>{t.btn_add}</button>}
                  <button className="btn-ghost" onClick={()=>openModal({type:"edit", account:a})}>{t.btn_edit}</button>
                  <button className="btn-ghost" onClick={()=>openModal({type:"credit-up", account:a})}>{t.btn_credit_up}</button>
                  <button className="btn-ghost" onClick={()=>openModal({type:"credit-down", account:a})}>{t.btn_credit_down}</button>
                  <span className="inline-block relative align-middle" ref={moreOpenId===a.id ? moreRef : null}>
                    <button className="btn-ghost" onClick={()=>setMoreOpenId(id=>id===a.id?null:a.id)}>{t.btn_more} ▾</button>
                    {moreOpenId===a.id && (
                      <div className="absolute right-0 top-7 bg-card bd border rounded shadow-xl w-44 z-40 text-sm" style={{whiteSpace:"normal"}}>
                        <button className="block w-full text-left px-4 py-2 row-hover" onClick={()=>{setMoreOpenId(null); openModal({type:"toggle", account:a});}}>
                          {a.status==="on"?t.act_disable:t.act_enable}
                        </button>
                        {a.parentId==="qweqwe" && (
                          <button className="block w-full text-left px-4 py-2 row-hover" onClick={()=>{setMoreOpenId(null); openModal({type:"scheme", account:a});}}>
                            {t.act_scheme}
                          </button>
                        )}
                      </div>
                    )}
                  </span>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function AddSubModal({parent, onClose, onSubmit, toast}){
  const {lang} = useT();
  const isTopAgent = parent.id === "qweqwe";
  const parentRate = parent.rate ?? 1.5; // 顶代用方案上限;此处为 mock
  // 预生成下一个序号
  const nextSeq = useMemo(()=>{
    // 查找 mock 中 parentId===parent.id 的最大序号
    const prefix = parent.id+"-";
    const seqs = INIT_ACCOUNTS.filter(a=>a.id.startsWith(prefix)).map(a=>parseInt(a.id.slice(prefix.length).split("-")[0],10));
    return Math.max(0, ...seqs) + 1;
  },[parent]);
  const newId = parent.id + "-" + nextSeq;

  const [form, setForm] = useState({
    user:"", nick:"", pwd:"", pwdConfirm:"", phone:"", phone2:"",
    type:"agent", status:"on",
    schemeId: isTopAgent ? "" : parent.schemeId,
    rate:"", opPwd:""
  });
  const [errors, setErrors] = useState({});

  const scheme = TOP_SCHEMES.find(s=>s.id===form.schemeId);
  const rateUpper = isTopAgent ? (scheme?.rate ?? 0) : parentRate;

  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const validate = () => {
    const e = {};
    if(!/^[A-Za-z0-9]{6,20}$/.test(form.user)) e.user = "仅支持英文及数字,6~20 位";
    if(!form.nick) e.nick = "请输入账户昵称";
    if(!form.pwd) e.pwd = "请输入密码";
    if(form.pwd !== form.pwdConfirm) e.pwdConfirm = "两次密码不一致";
    if(!form.schemeId) e.scheme = "请选择一条交收方案";
    if(form.rate === "" || isNaN(+form.rate)) e.rate = "请输入显示佣金率";
    else if(+form.rate > rateUpper) e.rate = `不可超过上限 ${rateUpper}%`;
    if(!form.opPwd) e.opPwd = "请输入操作密码";
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const submit = () => {
    if(!validate()) return;
    if(form.opPwd !== "123456"){
      setErrors(x=>({...x, opPwd:"操作密码错误"}));
      return;
    }
    onSubmit({
      id:newId, parentId:parent.id, nick:form.nick, user:form.user,
      type:form.type, schemeId:form.schemeId, rate:+form.rate,
      balance:0, totalBalance:0, status:form.status, childCount:0,
      createdAt:new Date().toISOString().slice(0,10),
      winLoss:0, validBet:0
    });
    toast(`新增成功:${newId}`);
    onClose();
  };

  return (
    <Modal title="新增下线" onClose={onClose} footer={
      <>
        <button className="btn-secondary" onClick={onClose}>取消</button>
        <button className="btn-primary" onClick={submit}>确认</button>
      </>
    }>
      {/* ① 关联信息 */}
      <Section title="① 关联信息">
        <div className="grid grid-cols-2 gap-4 text-sm">
          <div><span className="muted">上级信息:</span> {parent.nick}({parent.id})</div>
          <div><span className="muted">系统户口号:</span> <span className="gold font-mono">{newId}</span></div>
        </div>
        <div className="muted text-xs mt-2">系统户口号永不回收、永不复用、永不变更</div>
      </Section>

      {/* ② 基本信息 */}
      <Section title="② 基本信息">
        <div className="grid grid-cols-2 gap-4">
          <div>
            <FieldLabel req>用户账号</FieldLabel>
            <input className="input w-full" value={form.user} onChange={e=>set("user",e.target.value)} placeholder="6~20 位英文数字"/>
            {errors.user && <div className="danger text-xs mt-1">{errors.user}</div>}
          </div>
          <div>
            <FieldLabel req>账户昵称</FieldLabel>
            <input className="input w-full" value={form.nick} onChange={e=>set("nick",e.target.value)}/>
            {errors.nick && <div className="danger text-xs mt-1">{errors.nick}</div>}
          </div>
          <div>
            <FieldLabel req>密码</FieldLabel>
            <input type="password" className="input w-full" value={form.pwd} onChange={e=>set("pwd",e.target.value)}/>
            {errors.pwd && <div className="danger text-xs mt-1">{errors.pwd}</div>}
          </div>
          <div>
            <FieldLabel req>确认密码</FieldLabel>
            <input type="password" className="input w-full" value={form.pwdConfirm} onChange={e=>set("pwdConfirm",e.target.value)}/>
            {errors.pwdConfirm && <div className="danger text-xs mt-1">{errors.pwdConfirm}</div>}
          </div>
          <div>
            <FieldLabel>电话号码</FieldLabel>
            <input className="input w-full" value={form.phone} onChange={e=>set("phone",e.target.value)}/>
          </div>
          <div>
            <FieldLabel>备用电话</FieldLabel>
            <input className="input w-full" value={form.phone2} onChange={e=>set("phone2",e.target.value)}/>

          </div>

      {/* ④ 交收方案 */}

        {!isTopAgent ? (
          <div className="bg-elev bd border rounded p-3 text-sm">

            <div className="muted text-xs mt-1">如需更换,走 FN-ACC-12 修改交收方案高危流程</div>
          </div>
        ) : (
          <>
            {errors.scheme && <div className="danger text-xs mb-2">{errors.scheme}</div>}
            <table className="w-full text-sm bg-elev bd border rounded overflow-hidden">
              <thead className="table-head">
                <tr>
                  <th className="py-2 px-3 w-10"></th>
                  <th className="py-2 px-3">币种</th>
                  <th className="py-2 px-3">佣金率</th>
                  <th className="py-2 px-3">可用余额</th>
                </tr>
              </thead>
              <tbody>
                {TOP_SCHEMES.map(s=>(

function CreditModal({dir, account, parent, onClose, onSubmit, toast}){
  const [amount, setAmount] = useState("");
  const [opPwd, setOpPwd] = useState("");
  const [err, setErr] = useState({});
  const sc = TOP_SCHEMES.find(s=>s.id===account.schemeId);
  const parentBalance = parent.balance ?? (sc?.balance ?? 0);
  const submit = ()=>{
    const e={};
    const a = parseFloat(amount);
    if(!a || a<=0 || isNaN(a)) e.amount = "请输入正确金额";
    else if(!/^\d+(\.\d{1,2})?$/.test(amount)) e.amount = "小数最多 2 位";
    else if(dir==="up" && a > parentBalance) e.amount = `上级余额不足,当前可用 ${fmt(parentBalance)}`;
    else if(dir==="down" && a > account.balance) e.amount = `下级余额不足`;
    if(!opPwd) e.opPwd = "请输入操作密码";
    else if(opPwd !== "123456") e.opPwd = "操作密码错误";
    setErr(e);
    if(Object.keys(e).length) return;
    onSubmit(dir, account, a);
    toast(dir==="up"?"上分成功":"下分成功");
    onClose();
  };
  return (
    <Modal title={dir==="up"?"为下线上分":"从下线下分"} onClose={onClose} footer={
      <>
        <button className="btn-secondary" onClick={onClose}>取消</button>
        <button className="btn-primary" onClick={submit}>确认</button>
      </>
    } width={640}>
      <Section title="① 上级信息">
        <div>{parent.nick}({parent.id}) <span className="muted ml-3">代理线</span></div>
        <div className="muted text-sm mt-1">币种:{sc?.currency} · 佣金率:{parent.rate ?? sc?.rate}% · 额度:{fmt(parentBalance)}</div>
      </Section>
      <Section title="② 下级信息">
        <div>{account.nick}({account.id})</div>
        <div className="muted text-sm mt-1">币种:{sc?.currency} · 佣金率:{account.rate}% · 额度:{fmt(account.balance)}</div>
      </Section>
      <Section title={"③ 金额输入 "+(dir==="up"?"(上分额度)":"(下级额度)")}>
        <FieldLabel req>{dir==="up"?"上分额度":"下级额度"}</FieldLabel>
        <input type="number" step="0.01" className="input w-80" value={amount} onChange={e=>setAmount(e.target.value)}/>
        <div className="muted text-xs mt-1">不设单笔上限;真实钱流由账房侧关卡管控</div>
        {(() => {
          const a = parseFloat(amount);
          if(!a || isNaN(a) || a<=0) return null;
          const sign = dir==="up" ? 1 : -1;
          const nextParent = parentBalance - sign*a;
          const nextChild  = account.balance + sign*a;
          const bad = nextParent < 0 || nextChild < 0;
          return (
            <div className={"text-xs mt-2 " + (bad?"danger":"muted")}>
              调整后预览:上级 {fmt(parentBalance)} → <span className="gold">{fmt(nextParent)}</span>
              &nbsp;·&nbsp;下级 {fmt(account.balance)} → <span className="gold">{fmt(nextChild)}</span>
            </div>
          );
        })()}
        {err.amount && <div className="danger text-xs mt-1">{err.amount}</div>}
      </Section>
      <Section title="④ 安全校验">
        <FieldLabel req>操作密码</FieldLabel>
        <input type="password" className="input w-80" value={opPwd} onChange={e=>setOpPwd(e.target.value)}/>
        <div className="muted text-xs mt-1">Mock 密码:123456</div>
        {err.opPwd && <div className="danger text-xs mt-1">{err.opPwd}</div>}
      </Section>
    </Modal>
  );
}

/* =========================
   FN-ACC-12 修改交收方案(三步向导)
========================= */
function SchemeModal({account, accounts, onClose, onSubmit, toast}){
  const {lang} = useT();
  const [step, setStep] = useState(1);
  const [ack, setAck] = useState(false);
  const [newSchemeId, setNewSchemeId] = useState("");
  const [newRate, setNewRate] = useState("");
  const [opPwd, setOpPwd] = useState("");
  const [confirmCheck, setConfirmCheck] = useState(false);
  const [err, setErr] = useState("");

  // 计算子树所有账号
  const subtree = useMemo(()=>{
    const result = [];
    const walk = id=>{ accounts.filter(a=>a.parentId===id).forEach(a=>{ result.push(a); if(a.type==="agent") walk(a.id); }); };
    walk(account.id);
    return [account, ...result];
  },[accounts, account]);

  const hasBalance = subtree.some(a=>a.balance>0);
  const curScheme = TOP_SCHEMES.find(s=>s.id===account.schemeId);
  const targetScheme = TOP_SCHEMES.find(s=>s.id===newSchemeId);

  const goNext = () => {
    setErr("");
    if(step===1){ if(!ack) return; setStep(2); return; }
    if(step===2){ if(!newSchemeId) { setErr("请选择新方案"); return; } setStep(3); return; }
    if(step===3){
      if(hasBalance){ setErr("子树存在非零余额,无法切换(硬校验阻断)"); return; }
      if(!newRate || +newRate<=0){ setErr("请输入新方案显示佣金率"); return; }
      if(+newRate > (targetScheme?.rate ?? 100)){ setErr(`不可超过上限 ${targetScheme?.rate}%`); return; }
      if(!opPwd){ setErr("请输入操作密码"); return; }
      if(opPwd !== "123456"){ setErr("操作密码错误"); return; }
      if(!confirmCheck){ setErr("请勾选确认项"); return; }
      onSubmit(account.id, newSchemeId, +newRate, subtree.map(a=>a.id));
      toast(`已切换至 ${targetScheme.currency};影响账号 ${subtree.length} 个`);
      onClose();
    }
  };

  return (
    <Modal title={`修改交收方案 · 第 ${step} / 3 步`} onClose={onClose} warn={step===1} width={780} footer={
      <>
        <button className="btn-secondary" onClick={onClose}>取消</button>
        {step>1 && <button className="btn-secondary" onClick={()=>{ setErr(""); setStep(step-1); }}>上一步</button>}
        <button className={"btn-primary "+(step===1 && !ack ? "opacity-40 cursor-not-allowed":"")} onClick={goNext} disabled={step===1 && !ack}>
          {step===3?"确认切换":"下一步"}
        </button>
      </>
    }>
      {step===1 && (
        <div>
          <div className="bg-elev bd border rounded p-4 mb-4">
            <div className="danger text-lg font-semibold mb-2">⚠ 高危操作 · 一经执行不可撤销</div>
            <div className="muted text-sm space-y-1">
              <div>• 影响账号数:<span className="text-white">{subtree.length}</span>(本账号 + 子树全部后代)</div>
              <div>• 当前方案:{curScheme?.currency}(佣金率 {curScheme?.rate}%)</div>
              <div>• 切换后,整条线全部切换至新方案;旧方案下的余额、流水归档 ≥ 5 年</div>
              <div>• 须满足前置条件:子树可用余额 = 0 / 无在途流水 / 无未结注单</div>
              <div>• 子树当前余额检查:{hasBalance?<span className="danger">存在非零账号,将在硬校验阶段被拒绝</span>:<span className="good">全部为 0,通过</span>}</div>
            </div>
          </div>
          <label className="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" checked={ack} onChange={e=>setAck(e.target.checked)}/>
            <span>我已阅读并理解以上影响,点击继续</span>
          </label>
        </div>
      )}
      {step===2 && (
        <div>
          <Section title="当前方案(只读)">
            <div>{curScheme?.currency} · 佣金率 {curScheme?.rate}%</div>
          </Section>
          <Section title="选择新方案(单选)">
            <table className="w-full text-sm bg-elev bd border rounded overflow-hidden">
              <thead className="table-head">
                <tr><th className="py-2 px-3 w-10"></th><th className="py-2 px-3">币种</th><th className="py-2 px-3">佣金率</th><th className="py-2 px-3">可用余额</th></tr>
              </thead>
              <tbody>
                {TOP_SCHEMES.filter(s=>s.id!==account.schemeId).map(s=>(
                  <tr key={s.id} className={"text-center row-hover "+(newSchemeId===s.id?"bd-gold":"")} style={{borderTop:"1px solid #2A2A2C"}} onClick={()=>setNewSchemeId(s.id)}>
                    <td className="py-3 px-3"><input type="radio" checked={newSchemeId===s.id} onChange={()=>setNewSchemeId(s.id)}/></td>
                    <td className="py-3 px-3 gold font-semibold">{s.currency}</td>
                    <td className="py-3 px-3">{s.rate}%</td>
                    <td className="py-3 px-3">{fmtAmount(lang, s.balance)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </Section>
        </div>
      )}
      {step===3 && (
        <div>
          <div className="bg-elev bd border rounded p-4 mb-4 text-sm">
            <div>将 <span className="gold">{account.nick}({account.id})</span> 及其 <span className="gold">{subtree.length-1}</span> 个下线</div>
            <div>从 <span className="danger">{curScheme?.currency}</span> 切换至 <span className="good">{targetScheme?.currency}</span>(佣金率 {targetScheme?.rate}%)</div>
          </div>
          <div className="grid grid-cols-2 gap-4 mb-4">
            <div>
              <FieldLabel req>新方案显示佣金率</FieldLabel>
              <div className="flex items-center gap-2">
                <input type="number" step="0.01" className="input flex-1" value={newRate} onChange={e=>setNewRate(e.target.value)}/>
                <span className="muted">%</span>
              </div>
              <div className="muted text-xs mt-1">默认 = 该方案佣金率 {targetScheme?.rate}%;允许下调</div>
            </div>
            <div>
              <FieldLabel req>操作密码</FieldLabel>
              <input type="password" className="input w-full" value={opPwd} onChange={e=>setOpPwd(e.target.value)}/>
              <div className="muted text-xs mt-1">Mock 密码:123456</div>
            </div>
          </div>
          <label className="flex items-center gap-2 cursor-pointer mb-3">
            <input type="checkbox" checked={confirmCheck} onChange={e=>setConfirmCheck(e.target.checked)}/>
            <span>我确认所有相关账户余额已清零且无在途订单</span>
          </label>
        </div>
      )}
      {err && <div className="danger text-sm mt-2">❌ {err}</div>}
    </Modal>
  );
}

function ChangePwdModal({onClose, forceLogout, toast, forced}){
  const [oldP, setOldP] = useState("");
  const [newP, setNewP] = useState("");
  const [confP, setConfP] = useState("");
  const [show, setShow] = useState([false,false,false]);
  const [err, setErr] = useState({});
  // 成功:两种场景都要清会话重登
  const closeAndLogout = (msg)=>{ if(msg) toast(msg); onClose(); forceLogout(); };
  // 取消 / × 的差异化:首次登录强制 → 登出;页内主动 → 仅关闭
  const handleDismiss = ()=>{
    if(forced){ toast("未修改密码,已退出登录"); onClose(); forceLogout(); }
    else { onClose(); }
  };
  const submit = ()=>{
    const e={};
    if(!oldP) e.oldP = "请输入旧密码";
    if(!/^\S{6,20}$/.test(newP)) e.newP = "6~20 位,不支持空格";
    if(newP && newP===oldP) e.newP = "新密码不能与旧密码相同";
    if(newP !== confP) e.confP = "两次新密码不一致";
    setErr(e);
    if(Object.keys(e).length) return;
    // 后端业务错误:Toast 提示,弹窗保持打开,不登出(两场景一致,避免首登死循环)
    if(oldP!=="123456"){ toast("旧密码错误,请重试"); setErr({oldP:"旧密码错误"}); return; }
    // 成功:强制登出重登
    closeAndLogout("密码修改成功,请重新登录");
  };
  return (
    <div className="modal-backdrop">
      <div className="bg-card bd border rounded-lg shadow-2xl" style={{width:560}}>
        <div className="flex items-center justify-between px-6 py-4 border-b bd">
          <div className="flex-1 text-center">
            <Badge>修改密码{forced?<span className="ml-2 danger text-xs">· 首次登录强制</span>:null}</Badge>
          </div>
          <button onClick={handleDismiss} className="muted hover:text-white text-xl leading-none">×</button>
        </div>
        <div className="px-6 py-5 space-y-4">
          {[["旧密码",oldP,setOldP,0,"oldP"],["新密码",newP,setNewP,1,"newP"],["确认新密码",confP,setConfP,2,"confP"]].map(([label,val,set,i,k])=>(
            <div key={k}>
              <FieldLabel req>请输入{label}</FieldLabel>
              <div className="flex items-center gap-2">
                <input type={show[i]?"text":"password"} className="input flex-1" value={val} onChange={e=>set(e.target.value)}/>
                <button className="btn-secondary" onClick={()=>setShow(s=>{const n=[...s]; n[i]=!n[i]; return n;})}>{show[i]?"⊙":"⊘"}</button>
              </div>
              {err[k] && <div className="danger text-xs mt-1">{err[k]}</div>}
            </div>
          ))}
          <div className="muted text-xs">
            Mock 旧密码:<span className="gold">123456</span>。
            {forced
              ? "当前为「首次登录强制」场景:× / 取消 → 直接退出登录;修改成功 → 退出重登;旧密码错误 → 保持弹窗允许重试。"
              : "当前为「页内主动」场景:× / 取消 → 仅关闭弹窗,会话保持;修改成功 → 仍强制重登;旧密码错误 → 保持弹窗允许重试。"}
          </div>
        </div>
        <div className="px-6 py-4 border-t bd flex justify-end gap-3">
          <button className="btn-secondary" onClick={handleDismiss}>取消</button>
          <button className="btn-primary" onClick={submit}>确认</button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [logged, setLogged] = useState(true);
  const [lang, setLang] = useState("zh-CN");
  const t = I18N[lang] || I18N["zh-CN"];
  const [accounts, setAccounts] = useState(INIT_ACCOUNTS);
  const [timeRange, setTimeRange] = useState("thisMonth");
  const [start, setStart] = useState("2026-04-01");
  const [end, setEnd] = useState("2026-04-30");
  const [keyword, setKeyword] = useState("");
  const [expanded, setExpanded] = useState(new Set()); // 默认只展示当前登录账号(qweqwe)的直属下级,非直属下级收起;点击 ▶ 展开
  const [modal, setModal] = useState(null);
  const [toastMsg, setToastMsg] = useState(null);
  const [searchHits, setSearchHits] = useState(null);
  const toast = (m)=>setToastMsg(m);

  const toggle = (id)=>setExpanded(s=>{ const n=new Set(s); n.has(id)?n.delete(id):n.add(id); return n; });

  const doSearch = ()=>{
    const q = keyword.trim();
    if(!q){ setSearchHits(null); return; }
    // 单一输入框,同时匹配两个独立字段:
    //  - 系统户口号(id):精确匹配
    //  - 用户账号(user):大小写不敏感的模糊匹配(contains)
    const qLower = q.toLowerCase();
    const hits = accounts.filter(a=>
      a.id === q ||
      (a.user && a.user.toLowerCase().includes(qLower))
    );
    setSearchHits(hits);
  };
  const reset = ()=>{ setKeyword(""); setSearchHits(null); setExpanded(new Set()); setTimeRange("thisMonth"); };

  const openModal = m => setModal(m);
  const closeModal = ()=>setModal(null);

  const addAccount = a => setAccounts(list=>{
    const next = [...list, a];
    // 更新父级 childCount
    return next.map(x=>x.id===a.parentId ? {...x, childCount:(x.childCount||0)+1} : x);
  });
  const updateAccount = a => setAccounts(list=> list.map(x=>x.id===a.id?{...x,...a}:x));
  const transfer = (dir, account, amount) => setAccounts(list=> list.map(x=>{
    if(x.id===account.id) return {...x, balance: x.balance + (dir==="up"?+amount:-amount)};
    return x;
  }));
  const setStatus = (id, status) => setAccounts(list=>{
    // 级联禁用:把 id 的整棵子树一起改;启用仅自己
    if(status==="off"){
      const hit = new Set([id]);
      let changed = true;
      while(changed){
        changed = false;
        list.forEach(a=>{ if(hit.has(a.parentId) && !hit.has(a.id)){ hit.add(a.id); changed=true; } });
      }
      return list.map(x=> hit.has(x.id) ? {...x, status} : x);
    }
    return list.map(x=>x.id===id?{...x,status}:x);
  });
  const changeScheme = (rootId, newSchemeId, newRate, affectedIds) => setAccounts(list=> list.map(x=>{
    if(!affectedIds.includes(x.id)) return x;
    return {...x, schemeId:newSchemeId, rate: x.id===rootId ? newRate : Math.min(x.rate, newRate)};
  }));

  if(!logged){
    return (
      <I18NCtx.Provider value={{lang, t, setLang}}>
        <LoginPage onLogin={()=>setLogged(true)}/>
      </I18NCtx.Provider>
    );
  }

  return (
    <I18NCtx.Provider value={{lang, t, setLang}}>
    <div>
      <TopBar onMenu={k=>openModal({type:k})} lang={lang} setLang={setLang}/>
      <div className="flex">
        <SideMenu/>
        <div className="flex-1 p-6 scroll" style={{maxHeight:"calc(100vh - 56px)", overflow:"auto"}}>
          <div className="flex items-center mb-4">
            <div className="text-xl font-bold">{t.page_title}</div>
            <div className="muted text-sm ml-3">{t.top_logged}</div>
          </div>

          <TimeFilter value={timeRange} onChange={setTimeRange} start={start} end={end} setStart={setStart} setEnd={setEnd}/>

          <CurrencySummary accounts={accounts}/>

          <div className="bg-card bd border rounded-lg mt-5 p-4 flex items-center gap-3">
            <input className="input flex-1 max-w-sm" placeholder={t.placeholder_search} value={keyword} onChange={e=>setKeyword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSearch()}/>
            <button className="btn-secondary" onClick={reset}>{t.btn_reset}</button>
            <button className="btn-secondary" onClick={doSearch}>{t.btn_query}</button>
            <div className="flex-1"></div>
            <button className="btn-primary" onClick={()=>openModal({type:"add", parent:TOP_AGENT})}>{t.btn_add_main}</button>
          </div>

          {searchHits && <div className="muted text-xs mt-3">{t.search_hits(searchHits.length)}</div>}

          <DownlineTable accounts={accounts} expanded={expanded} toggle={toggle} openModal={openModal} searchHits={searchHits}/>

          <div className="muted text-xs mt-6 leading-6">
            <div>{t.tips_title}</div>
            <div>• {t.tips_pwd}<span className="gold">123456</span></div>
            <div>• {t.tips_search}</div>
            <div>• {t.tips_add}</div>
            <div>• {t.tips_scheme}</div>
            <div>• {t.tips_pwd_logout} <button className="btn-ghost ml-2" onClick={()=>openModal({type:"changePwd", forced:true})}>{t.tips_pwd_force_sim}</button></div>
            <div>• {t.tips_i18n}</div>
          </div>
        </div>
      </div>

      {/* 弹窗层 */}
      {modal?.type==="add" && <AddSubModal parent={modal.parent} onClose={closeModal} onSubmit={addAccount} toast={toast}/>}
      {modal?.type==="edit" && <EditProfileModal account={modal.account} onClose={closeModal} onSubmit={updateAccount} toast={toast}/>}
      {(modal?.type==="credit-up" || modal?.type==="credit-down") && (
        <CreditModal
          dir={modal.type==="credit-up"?"up":"down"}
          account={modal.account}
          parent={accounts.find(a=>a.id===modal.account.parentId) || {...TOP_AGENT, rate:TOP_SCHEMES.find(s=>s.id===modal.account.schemeId)?.rate, balance:TOP_SCHEMES.find(s=>s.id===modal.account.schemeId)?.balance}}
          onClose={closeModal} onSubmit={transfer} toast={toast}/>
      )}
      {modal?.type==="toggle" && <ToggleModal account={modal.account} onClose={closeModal} onSubmit={setStatus} toast={toast}/>}
      {modal?.type==="scheme" && <SchemeModal account={modal.account} accounts={accounts} onClose={closeModal} onSubmit={changeScheme} toast={toast}/>}
      {modal?.type==="changePwd" && <ChangePwdModal onClose={closeModal} forceLogout={()=>setLogged(false)} toast={toast} forced={!!modal.forced}/>}
      {modal?.type==="logout" && <LogoutModal onClose={closeModal} forceLogout={()=>setLogged(false)} toast={toast}/>}

      {toastMsg && <Toast msg={toastMsg} onDone={()=>setToastMsg(null)}/>}
    </div>
    </I18NCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
