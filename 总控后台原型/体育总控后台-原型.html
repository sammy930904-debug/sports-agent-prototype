/* =========================
   Top Agents
========================= */
function AgentsPage({ role }){
  const [q, setQ] = useState("");
  const [statusFilter, setStatusFilter] = useState("all");
  const [showAdd, setShowAdd] = useState(false);
  const [freezeTarget, setFreezeTarget] = useState(null);
  const [rateTarget, setRateTarget] = useState(null);
  const [schemeTarget, setSchemeTarget] = useState(null);
  const [expanded, setExpanded] = useState(new Set());
  const [toast, setToast] = useState("");

  const topRows = TOP_AGENTS.filter(a => {
    if (statusFilter !== "all" && a.status !== statusFilter) return false;
    if (q && !(a.id.includes(q) || a.nick.toLowerCase().includes(q.toLowerCase()) || a.accHouse.includes(q))) return false;
    return true;
  });

  // 展开/收起一级
  const toggleExpand = (id) => {
    setExpanded(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };

  // 将 (筛选后的顶代 + 展开的下线) 扁平化为带 depth 的行序列
  const flatten = () => {
    const list = [];
    const walk = (node, depth) => {
      const kids = DOWNLINES[node.id] || [];
      list.push({ ...node, depth, isTop: depth===0, hasChildren: kids.length>0 });
      if (expanded.has(node.id)) kids.forEach(k => walk(k, depth+1));
    };
    topRows.forEach(a => walk(a, 0));
    return list;
  };
  const rows = flatten();
  const downlineShown = rows.filter(r => !r.isTop).length;

  const canOperate = role === "operator";

  const doFreeze = ()=>{
    const t = freezeTarget;
    const label = t.isTop ? "顶代" : "下线";
    setToast(`已${t.status==="frozen"?"解冻":"冻结"}${label} ${t.nick}(${t.id})${t.isTop?`,相关下级操作已${t.status==="frozen"?"恢复":"全部阻断"}`:""}`);

    setTimeout(()=>setToast(""), 3000);
  };

    setTimeout(()=>setToast(""), 3000);

  const doAdjustScheme = (newScheme)=>{

    setToast(`已更新 ${t.nick}(${t.id}) 交收方案:${t.scheme} → ${newScheme},变更已写入审计日志`);
    setSchemeTarget(null);

          <option value="active">活跃</option>
          <option value="frozen">已冻结</option>
        </select>
        <div className="ml-auto text-xs muted">命中顶代 {topRows.length} 条 · 展开下线 {downlineShown} 条</div>
      </div>

      <div className="bg-card bd border rounded-lg overflow-hidden" style={{borderColor:"#1F2730"}}>

              <th className="text-left px-4 py-3">昵称</th>
              <th className="text-left px-4 py-3">账房户 / 上级</th>
              <th className="text-left px-4 py-3">交收方案</th>
              <th className="text-right px-4 py-3">可用余额</th>
              <th className="text-center px-4 py-3">下线数</th>
              <th className="text-center px-4 py-3">对账偏差</th>
              <th className="text-center px-4 py-3">状态</th>
              <th className="text-left px-4 py-3">创建时间</th>
              <th className="text-right px-4 py-3 pr-6">操作</th>
            </tr>
          </thead>
          <tbody>
            {rows.length===0 && (
              <tr><td colSpan="10" className="text-center py-10 muted text-sm">无匹配顶代,请调整筛选条件</td></tr>

            {rows.map(a => {
              const indent = 8 + a.depth*20;
              const caret = a.hasChildren
                ? (expanded.has(a.id) ? "▾" : "▸")
                : "·";
              return (
                <tr key={a.id} className="row-hover bd border-t" style={{borderColor:"#1F2730", background: a.depth>0 ? "rgba(74,158,255,0.03)" : "transparent"}}>

                        display:"inline-block", width:18, textAlign:"center",
                        color: a.hasChildren ? "#4A9EFF" : "#3A4654",

                        background:"transparent", border:"none", padding:0, marginRight:4, fontSize:12
                      }}>{caret}</button>

                     a.driftSec > 60 ? <span className="chip chip-frozen">{fmtDrift(a.driftSec)} 超阈值</span> :
                     <span className="chip chip-on">{fmtDrift(a.driftSec)}</span>}

function AddAgentModal({ onClose, onDone }){
  const [accHouse, setAccHouse] = useState("");
  const [nick, setNick] = useState("");
  const [currency, setCurrency] = useState("PHP");
  const [rate, setRate] = useState("");
  const [initBalance, setInitBalance] = useState("");
  const [rateCap, setRateCap] = useState("");
  const [opPwd, setOpPwd] = useState("");
  const [err, setErr] = useState({});

  const submit = ()=>{
    const e = {};
    if (!accHouse) e.accHouse = "账房户号必填";
    if (!nick) e.nick = "昵称必填";
    if (!rate || +rate<=0) e.rate = "佣金率必填且 > 0";
    if (!rateCap || +rateCap < +rate) e.rateCap = "佣金率上限必须 ≥ 当前佣金率";
    if (!opPwd) e.opPwd = "操作密码必填";
    else if (opPwd !== "123456") e.opPwd = "操作密码错误(Mock: 123456)";
    setErr(e);
    if (Object.keys(e).length) return;
    // 系统户口号生成:acc house 转换
    const sysId = accHouse.toLowerCase().replace(/[^a-z0-9]/g, "").slice(0, 8) || "newagent";
    onDone(`已创建顶代 ${nick}(${sysId}),绑定账房户 ${accHouse},初始方案 ${currency} ${rate}%,初始余额 ${initBalance||0}`);
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="bg-card bd border rounded-lg p-6 w-[560px]" style={{borderColor:"#1F2730"}} onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between mb-5">
          <h2 className="font-semibold">新增顶代</h2>
          <button className="muted text-xl" onClick={onClose}>×</button>
        </div>

        <div className="bg-warn-soft warn text-xs p-3 rounded mb-4 border" style={{borderColor:"rgba(255,181,71,.3)"}}>
          ⚠ 高风险操作:创建顶代会自动分配系统户口号并锁定账房户映射,一经提交不可撤销;请核对账房户号与初始方案后再确认。
        </div>

        <div className="space-y-3">
          <div>
            <label className="req text-xs muted block mb-1">账房户号</label>
            <input className="input w-full" placeholder="AH-001 / ACCH-XXX" value={accHouse} onChange={e=>setAccHouse(e.target.value)}/>
            {err.accHouse && <div className="danger text-xs mt-1">{err.accHouse}</div>}
          </div>
          <div>
            <label className="req text-xs muted block mb-1">顶代昵称(界面展示用)</label>
            <input className="input w-full" value={nick} onChange={e=>setNick(e.target.value)}/>

          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="req text-xs muted block mb-1">初始交收方案 · 币种</label>
              <select className="input w-full" value={currency} onChange={e=>setCurrency(e.target.value)}>
                {CURRENCIES.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div>
              <label className="req text-xs muted block mb-1">初始佣金率(%)</label>
              <input className="input w-full" type="number" step="0.1" value={rate} onChange={e=>setRate(e.target.value)}/>

              <label className="req text-xs muted block mb-1">佣金率上限(%)</label>
              <input className="input w-full" type="number" step="0.1" value={rateCap} onChange={e=>setRateCap(e.target.value)}/>

function FreezeModal({ agent, onClose, onConfirm }){
  const [reason, setReason] = useState("");
  const [opPwd, setOpPwd] = useState("");
  const [err, setErr] = useState("");
  const frozen = agent.status === "frozen";
  const submit = ()=>{
    if (!reason) { setErr("请填写操作原因以便审计"); return; }
    if (!opPwd) { setErr("请输入操作密码"); return; }
    if (opPwd !== "123456") { setErr("操作密码错误"); return; }
    onConfirm();
  };
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="bg-card bd border rounded-lg p-6 w-[480px]" style={{borderColor:"#1F2730"}} onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <h2 className="font-semibold">{frozen ? "解冻顶代" : "冻结顶代"}</h2>
          <button className="muted text-xl" onClick={onClose}>×</button>
        </div>
        <div className={frozen ? "bg-good-soft good text-xs p-3 rounded mb-4 border" : "bg-danger-soft danger text-xs p-3 rounded mb-4 border"}
             style={{borderColor: frozen?"rgba(61,214,140,.3)":"rgba(255,89,97,.3)"}}>
          {frozen
            ? `即将解冻 ${agent.nick}(${agent.id}),该顶代及其全部下线将恢复登录、上下分、修改方案等操作。`
            : `即将冻结 ${agent.nick}(${agent.id}),该顶代的 ${agent.subCount} 个下线全部无法登录、无法发起上下分;正在进行的会话强制登出。`}
        </div>
        <div className="space-y-3">
          <div>
            <label className="req text-xs muted block mb-1">操作原因(审计必填)</label>
            <textarea className="input w-full" style={{height:72}} value={reason} onChange={e=>setReason(e.target.value)}
              placeholder={frozen?"例:风控审查已结束,恢复运营":"例:检测到异常流水,暂停运营等待核查"}/>
          </div>
          <div>
            <label className="req text-xs muted block mb-1">操作密码</label>
            <input className="input w-full" type="password" value={opPwd} onChange={e=>setOpPwd(e.target.value)}/>
          </div>
          {err && <div className="danger text-xs">{err}</div>}
        </div>
        <div className="flex justify-end gap-2 mt-5">
          <button className="btn-secondary" onClick={onClose}>取消</button>
          <button className={frozen?"btn-primary":"btn-danger"} onClick={submit}>{frozen?"确认解冻":"确认冻结"}</button>
        </div>
      </div>
    </div>
  );
}

            <input className="input w-full" type="password" value={opPwd} onChange={e=>setOpPwd(e.target.value)}/>

          {err && <div className="danger text-xs">{err}</div>}

function LedgerPage(){
  const [tab, setTab] = useState("internal");
  const [agentFilter, setAgentFilter] = useState("all");
  const [curFilter, setCurFilter] = useState("all");
  const [dirFilter, setDirFilter] = useState("all");

  const internalRows = LEDGER_INTERNAL.filter(r => {
    if (agentFilter !== "all" && r.agent !== agentFilter) return false;
    if (curFilter !== "all" && r.currency !== curFilter) return false;
    if (dirFilter !== "all" && r.direction !== dirFilter) return false;
    return true;
  });

  const houseRows = LEDGER_HOUSE.filter(r => {
    if (agentFilter !== "all" && r.agent !== agentFilter) return false;
    if (curFilter !== "all" && r.currency !== curFilter) return false;
    return true;
  });

  const totalCredit = internalRows.filter(r=>r.direction==="credit").reduce((s,r)=>s+r.amount,0);
  const totalDebit  = internalRows.filter(r=>r.direction==="debit").reduce((s,r)=>s+r.amount,0);
  const driftCount  = houseRows.filter(r=>r.status==="drift"||r.status==="stopped").length;

  return (
    <div className="p-6 space-y-4">
      <div>
        <h1 className="text-lg font-semibold">流水与对账</h1>
        <div className="text-xs muted mt-1">内部上下分 + 账房双向对账 · 所有数据 T+0 实时(账房侧延迟 ≤ 60s)</div>
      </div>

      {/* Tabs */}
      <div className="flex bd border-b" style={{borderColor:"#1F2730"}}>
        <div className={`tab-btn ${tab==="internal"?"active":""}`} onClick={()=>setTab("internal")}>内部流水({internalRows.length})</div>
        <div className={`tab-btn ${tab==="house"?"active":""}`} onClick={()=>setTab("house")}>账房对账({houseRows.length}
          {driftCount>0 && <span className="ml-1 chip chip-frozen" style={{fontSize:10}}>偏差 {driftCount}</span>})</div>
        <div className="ml-auto flex items-center gap-3">
          <button className="btn-secondary">导出 CSV</button>
        </div>
      </div>

      {/* Filters */}
      <div className="flex items-center gap-3 flex-wrap">
        <select className="input" value={agentFilter} onChange={e=>setAgentFilter(e.target.value)}>
          <option value="all">全部顶代</option>
          {TOP_AGENTS.map(a=><option key={a.id} value={a.id}>{a.nick}({a.id})</option>)}
        </select>
        <select className="input" value={curFilter} onChange={e=>setCurFilter(e.target.value)}>
          <option value="all">全部币种</option>
          {CURRENCIES.map(c=><option key={c}>{c}</option>)}
        </select>
        {tab==="internal" && (
          <select className="input" value={dirFilter} onChange={e=>setDirFilter(e.target.value)}>
            <option value="all">全部方向</option>
            <option value="credit">上分</option>
            <option value="debit">下分</option>
          </select>
        )}
        <input className="input" type="date" defaultValue="2026-04-20"/>
        <span className="muted text-xs">~</span>
        <input className="input" type="date" defaultValue="2026-04-20"/>
      </div>

      {/* Internal 流水 */}
      {tab==="internal" && (
        <>
          <div className="grid grid-cols-3 gap-4">
            <div className="kpi-card"><div className="kpi-label">上分合计</div><div className="kpi-value good">+{fmt(totalCredit)}</div><div className="muted text-xs mt-1">{internalRows.filter(r=>r.direction==="credit").length} 笔</div></div>
            <div className="kpi-card"><div className="kpi-label">下分合计</div><div className="kpi-value danger">-{fmt(totalDebit)}</div><div className="muted text-xs mt-1">{internalRows.filter(r=>r.direction==="debit").length} 笔</div></div>
            <div className="kpi-card"><div className="kpi-label">净额(内部闭环)</div><div className="kpi-value">{fmt(totalCredit-totalDebit)}</div><div className="muted text-xs mt-1">不涉及账房真实资金</div></div>
          </div>

          <div className="bg-card bd border rounded-lg overflow-hidden" style={{borderColor:"#1F2730"}}>
            <table className="w-full text-sm">
              <thead className="table-head">
                <tr>
                  <th className="text-left px-4 py-3">流水号</th>
                  <th className="text-left px-4 py-3">时间</th>
                  <th className="text-left px-4 py-3">顶代</th>
                  <th className="text-left px-4 py-3">From</th>
                  <th className="text-left px-4 py-3">To</th>
                  <th className="text-center px-4 py-3">方向</th>
                  <th className="text-right px-4 py-3">金额</th>
                  <th className="text-center px-4 py-3">币种</th>
                  <th className="text-left px-4 py-3">操作人</th>
                </tr>
              </thead>
              <tbody>
                {internalRows.length===0 && (
                  <tr><td colSpan="9" className="text-center py-10 muted text-sm">无匹配流水</td></tr>
                )}
                {internalRows.map(r => (
                  <tr key={r.id} className="row-hover bd border-t" style={{borderColor:"#1F2730"}}>
                    <td className="px-4 py-3 font-mono text-xs accent">{r.id}</td>
                    <td className="px-4 py-3 text-xs muted">{r.time}</td>
                    <td className="px-4 py-3 text-xs">{r.agent}</td>
                    <td className="px-4 py-3 font-mono text-xs">{r.from}</td>
                    <td className="px-4 py-3 font-mono text-xs">{r.to}</td>
                    <td className="px-4 py-3 text-center">
                      {r.direction==="credit" ? <span className="chip chip-on">上分</span> : <span className="chip chip-frozen">下分</span>}
                    </td>
                    <td className="px-4 py-3 text-right">{fmt(r.amount)}</td>
                    <td className="px-4 py-3 text-center text-xs muted">{r.currency}</td>
                    <td className="px-4 py-3 text-xs">{r.operator}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>
      )}

      {/* House 对账 */}
      {tab==="house" && (
        <>
          <div className="grid grid-cols-3 gap-4">
            <div className="kpi-card"><div className="kpi-label">对账一致顶代</div><div className="kpi-value good">{houseRows.filter(r=>r.status==="ok").length}</div></div>
            <div className="kpi-card"><div className="kpi-label">偏差超 60s</div><div className="kpi-value warn">{houseRows.filter(r=>r.status==="drift").length}</div><div className="muted text-xs mt-1">需人工核查</div></div>
            <div className="kpi-card"><div className="kpi-label">同步停止</div><div className="kpi-value danger">{houseRows.filter(r=>r.status==="stopped").length}</div><div className="muted text-xs mt-1">立即处理</div></div>
          </div>

          <div className="bg-card bd border rounded-lg overflow-hidden" style={{borderColor:"#1F2730"}}>
            <table className="w-full text-sm">
              <thead className="table-head">
                <tr>
                  <th className="text-left px-4 py-3">顶代</th>
                  <th className="text-left px-4 py-3">账房户号</th>
                  <th className="text-center px-4 py-3">币种</th>
                  <th className="text-right px-4 py-3">账房侧余额</th>
                  <th className="text-right px-4 py-3">平台侧余额</th>
                  <th className="text-right px-4 py-3">差额</th>
                  <th className="text-left px-4 py-3">最后同步</th>
                  <th className="text-center px-4 py-3">状态</th>
                  <th className="text-right px-4 py-3 pr-6">操作</th>
                </tr>
              </thead>
              <tbody>
                {houseRows.length===0 && (
                  <tr><td colSpan="9" className="text-center py-10 muted text-sm">无匹配对账记录</td></tr>
                )}
                {houseRows.map(r => (
                  <tr key={r.agent} className="row-hover bd border-t" style={{borderColor:"#1F2730"}}>
                    <td className="px-4 py-3">
                      <div className="text-sm">{r.nick}</div>
                      <div className="font-mono text-xs muted">{r.agent}</div>
                    </td>
                    <td className="px-4 py-3 font-mono text-xs">{r.accHouse}</td>
                    <td className="px-4 py-3 text-center text-xs muted">{r.currency}</td>
                    <td className="px-4 py-3 text-right">{fmt(r.houseBalance)}</td>
                    <td className="px-4 py-3 text-right">{fmt(r.platBalance)}</td>
                    <td className="px-4 py-3 text-right">
                      {r.diff === 0 ? <span className="muted">0</span> :
                       <span className={r.diff>0?"danger":"warn"}>{r.diff>0?"+":""}{fmt(r.diff)}</span>}
                    </td>
                    <td className="px-4 py-3 text-xs muted">{r.lastSync}</td>
                    <td className="px-4 py-3 text-center">
                      {r.status==="ok"      && <span className="chip chip-on">一致</span>}
                      {r.status==="drift"   && <span className="chip chip-warn">偏差超阈值</span>}
                      {r.status==="stopped" && <span className="chip chip-frozen">同步停止</span>}
                    </td>
                    <td className="px-4 py-3 text-right pr-6">
                      <button className="btn-ghost">查看明细</button>
                      {r.status!=="ok" && <button className="btn-ghost" style={{color:"#FFB547"}}>重试同步</button>}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>
      )}
    </div>
  );
}

/* =========================
   Login
========================= */
function LoginPage({ onLogin }){
  const [user, setUser] = useState("admin@platform");
  const [pwd, setPwd]   = useState("");
  const [err, setErr]   = useState("");
  const submit = ()=>{
    if (!user || !pwd) { setErr("账号和密码不能为空"); return; }
    if (pwd !== "123456") { setErr("密码错误(Mock: 123456)"); return; }
    onLogin();
  };
  return (
    <div className="min-h-screen flex items-center justify-center">
      <div className="bg-card bd border rounded-lg p-8 w-[400px]" style={{borderColor:"#1F2730"}}>
        <div className="text-center mb-6">
          <div className="inline-flex w-12 h-12 rounded-lg bg-accent items-center justify-center font-bold text-xl mb-3">S</div>
          <h1 className="font-semibold">体育游戏总控后台</h1>
          <div className="text-xs muted mt-1">Platform Control · Internal Only</div>
        </div>
        <div className="space-y-3">
          <div>
            <label className="text-xs muted block mb-1">账号</label>
            <input className="input w-full" value={user} onChange={e=>setUser(e.target.value)}/>
          </div>
          <div>
            <label className="text-xs muted block mb-1">密码</label>
            <input className="input w-full" type="password" value={pwd} onChange={e=>setPwd(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
          </div>
          {err && <div className="danger text-xs">{err}</div>}
          <button className="btn-primary w-full mt-2" onClick={submit}>登录</button>
          <div className="text-xs muted text-center mt-3 leading-relaxed">
            💡 测试 Tips:Mock 密码 123456;连续 5 次错误锁定 10 分钟<br/>
            角色切换在登录后头部右侧,可模拟 operator / risk / finance 三种权限视图
          </div>
        </div>
      </div>
    </div>
  );
}

/* =========================
   App Root
========================= */
function App(){
  const [logged, setLogged] = useState(false);
  const [role, setRole] = useState("operator");
  const [active, setActive] = useState("dashboard");

  // 切角色时,若当前菜单对该角色不可见,自动落回 dashboard
  useEffect(()=>{
    if (!ROLES[role].menus.includes(active)) setActive("dashboard");
  },[role]);

  if (!logged) return <LoginPage onLogin={()=>setLogged(true)} />;

  return (
    <div>
      <TopBar role={role} setRole={setRole} onLogout={()=>setLogged(false)} />
      <div className="flex">
        <Sidebar active={active} setActive={setActive} role={role} />
        <main className="flex-1 min-w-0 overflow-auto" style={{minHeight:"calc(100vh - 56px)"}}>
          {active==="dashboard" && <Dashboard />}
          {active==="agents"    && <AgentsPage role={role} />}
          {active==="ledger"    && <LedgerPage />}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
