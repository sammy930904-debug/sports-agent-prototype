<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect } = React;

/* V0.3 新增:视口检测 —— H5(窄屏/横屏矮窗)vs 桌面 */
function useViewport(){
  const calc = ()=>{
    const w = window.innerWidth, h = window.innerHeight;
    const isLandscape = w > h;
    const isMobile = w <= 767 || (isLandscape && h <= 520);
    return { w, h, isMobile, isLandscape };
  };
  const [vp, setVp] = useState(calc);
  useEffect(()=>{
    const onResize = ()=> setVp(calc());
    window.addEventListener("resize", onResize);
    window.addEventListener("orientationchange", onResize);
    return ()=>{
      window.removeEventListener("resize", onResize);
      window.removeEventListener("orientationchange", onResize);
    };
  }, []);
  return vp;
}

/* 工具 */
function fmt(n, currency){
  if(n==null) return "-";
  try { return new Intl.NumberFormat("en-US").format(n) + " " + currency; }
  catch(e){ return n + " " + currency; }
}

            </div>
            <div className="flex justify-between">
              <span className="muted">{t.third_party_balance}</span>
              <span className="gold font-semibold">{fmt(scheme.balance, scheme.currency)}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* =========================
   根组件 — 驱动三种视图 + 演示顶代/非顶代分支
========================= */
function App(){
  const vp = useViewport();
  const [lang, setLang] = useState("zh-CN");
  const [devRole, setDevRole] = useState("top"); // top | sub
  // stage: login | scheme | game
  const [stage, setStage] = useState("login");
  const [user, setUser] = useState(null);
  const [scheme, setScheme] = useState(null);

  const reset = ()=>{ setStage("login"); setUser(null); setScheme(null); };

  const onLoggedIn = (u)=>{
    setUser(u);
    if(u.topAgent){
      setStage("scheme");
    } else {
      // 非顶代:方案继承,直接进入游戏
      setScheme(u.schemes[0]);
      setStage("game");
    }
  };

  const onSchemeCancel = ()=>{
    // 取消 → 回到登录页
    reset();
  };

  const onSchemeConfirm = (s)=>{
    setScheme(s);
    setStage("game");
  };

  return (
    <div>
      <DevBar role={devRole} setRole={setDevRole} lang={lang} onReset={reset}/>

      {stage==="login" && (
        <LoginPage lang={lang} setLang={setLang}
                   devRole={devRole}
                   isMobile={vp.isMobile}
                   onLoggedIn={onLoggedIn}/>
      )}

      {stage==="scheme" && user && (
        vp.isMobile ? (
          /* H5:方案页是全屏的,不叠加登录页背景 */
          <SchemePage lang={lang}
                      schemes={user.schemes}
                      onCancel={onSchemeCancel}
                      onConfirm={onSchemeConfirm}/>
        ) : (
          <>
            {/* 桌面端:弹窗叠在登录页背景上,更接近真实体验 */}
            <LoginPage lang={lang} setLang={setLang}
                       devRole={devRole}
                       isMobile={false}
                       onLoggedIn={()=>{}}/>
            <SchemeModal lang={lang}
                         schemes={user.schemes}
                         onCancel={onSchemeCancel}
                         onConfirm={onSchemeConfirm}/>
          </>
        )
      )}

      {stage==="game" && user && scheme && (
        <ThirdPartyGame lang={lang} user={user} scheme={scheme} onLogout={reset}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
